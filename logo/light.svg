<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 128" width="400" height="128">
  <defs>
    <linearGradient id="shieldGradientDark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffaa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00dd77;stop-opacity:1" />
    </linearGradient>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Shield Outline -->
  <path d="M 64 13 
           L 109 29 
           L 109 64 
           Q 109 96, 64 115 
           Q 19 96, 19 64 
           L 19 29 
           Z" 
        fill="none" 
        stroke="url(#shieldGradientDark)" 
        stroke-width="4" 
        stroke-linejoin="round"
        filter="url(#glow)"/>
  
  <!-- Checkmark -->
  <path d="M 45 64 
           L 58 77 
           L 86 45" 
        fill="none" 
        stroke="url(#shieldGradientDark)" 
        stroke-width="5" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        filter="url(#glow)"/>
  
  <!-- Text: QWED-AI Docs -->
  <text x="140" y="74" 
        font-family="'Inter', 'SF Pro Display', -apple-system, system-ui, sans-serif" 
        font-size="42" 
        font-weight="700"
        fill="url(#shieldGradientDark)"
        filter="url(#glow)">
    QWED-AI <tspan font-weight="400" opacity="0.8">Docs</tspan>
  </text>
</svg>
